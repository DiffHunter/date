<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lepší zítřky </title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffe5ec, #ffc2d1);
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
        }

        .container {
            background-color: white;
            padding: 30px 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 450px;
            width: 90%;
            transition: all 0.3s ease;
        }

        h1 {
            color: #ff477e;
            margin-bottom: 20px;
            font-size: 2rem;
            line-height: 1.3;
        }

        p {
            color: #555;
            font-size: 1.1rem;
            line-height: 1.5;
            margin-bottom: 25px;
        }

        .buttons {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            min-height: 60px;
        }

        button {
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        #btnNext {
            background-color: #ff477e;
            color: white;
            box-shadow: 0 5px 15px rgba(255, 71, 126, 0.4);
        }

        #btnNext:hover {
            transform: scale(1.05);
            background-color: #e03e6f;
        }

        #btnYes {
            background-color: #2ecc71;
            color: white;
            box-shadow: 0 5px 15px rgba(46, 204, 113, 0.4);
        }

        #btnYes:hover {
            transform: scale(1.05);
            background-color: #27ae60;
        }

        #btnNo {
            background-color: #e74c3c;
            color: white;
            box-shadow: 0 5px 15px rgba(231, 76, 60, 0.4);
            transition: left 0.15s ease, top 0.15s ease, transform 0.2s ease;
        }

        /* Nové styly pro kalendář v usmireni.html */
        .datepicker-box {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
            animation: pop 0.5s ease;
        }

        input[type="date"] {
            border: 2px solid #ffc2d1;
            border-radius: 12px;
            background-color: #fff0f3;
            color: #444;
            padding: 15px;
            font-size: 1.2rem;
            width: calc(100% - 30px);
            cursor: pointer;
            outline: none;
            transition: all 0.2s ease;
        }

        input[type="date"]:focus {
            border-color: #ff477e;
            background-color: #fff;
            box-shadow: 0 0 10px rgba(255, 71, 126, 0.1);
        }

        #btnSubmitDate {
            background-color: #ff477e;
            color: white;
            margin-top: 10px;
            padding: 12px 40px;
            font-size: 1.1rem;
            width: 100%;
            border-radius: 50px;
            box-shadow: 0 5px 15px rgba(255, 71, 126, 0.3);
        }

        #btnSubmitDate:disabled {
            background-color: #ccc;
            box-shadow: none;
            cursor: not-allowed;
        }

        .screenshot-note {
            font-size: 1.1rem;
            color: #666;
            margin-top: 20px;
            background-color: #fff0f3;
            padding: 15px;
            border-radius: 10px;
            border: 1px dashed #ff477e;
            animation: pop 0.5s ease 0.3s backwards;
        }

        .animate-box {
            animation: pop 0.5s ease;
        }

        @keyframes pop {
            0% { transform: scale(0.6); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="container" id="mainContainer">
        <!-- FÁZE 1: Úvodní hláška a tlačítko Dále -->
        <div id="phase1" class="animate-box">
            <h1>Dokážou se Pinďa a Juicy Vanilka vrátit k tomu hezkému?🤔🌸✨</h1>
            <div class="buttons">
                <button id="btnNext" onclick="goToPhase2()">Dále ➡️</button>
            </div>
        </div>
    </div>

    <script>
        function goToPhase2() {
            const container = document.getElementById('mainContainer');
            container.innerHTML = `
                <div id="phase2" class="animate-box">
                    <p style="margin-top: 10px;">Bobi, doufám, že ti čas, který jsi potřebovala pro sebe, pomohl. Mrzí mě, že mezi námi vznikla taková situace😔. Nechci se hádat ani se vracet k výčitkám... Rád bych tě znovu viděl.🥺 Budu rád, když spolu zajdeme na kafe. Co ty na to?</p>
                    <div class="buttons">
                        <button id="btnYes" onclick="acceptPeace()">Jasně, beru ☕</button>
                        <button id="btnNo" onmouseover="moveButton()" onclick="moveButton()">NE 😤</button>
                    </div>
                </div>
            `;
        }

        // Šílené létání všude možně s ochranou proti překrytí (přesně tvoje funkční verze)
        function moveButton() {
            const btnNo = document.getElementById('btnNo');
            const btnYes = document.getElementById('btnYes');
            
            if (!btnYes) return;
            
            btnNo.style.position = 'fixed';
            
            const yesRect = btnYes.getBoundingClientRect();
            
            const btnWidth = btnNo.clientWidth;
            const btnHeight = btnNo.clientHeight;
            
            let randomX, randomY;
            let isOverlapping = true;
            let safetyBuffer = 40; 
            
            while (isOverlapping) {
                randomX = Math.floor(Math.random() * (window.innerWidth - btnWidth));
                randomY = Math.floor(Math.random() * (window.innerHeight - btnHeight));
                
                if (
                    randomX + btnWidth < yesRect.left - safetyBuffer || 
                    randomX > yesRect.right + safetyBuffer ||          
                    randomY + btnHeight < yesRect.top - safetyBuffer ||  
                    randomY > yesRect.bottom + safetyBuffer             
                ) {
                    isOverlapping = false; 
                }
            }
            
            btnNo.style.left = randomX + 'px';
            btnNo.style.top = randomY + 'px';
            
            // Náhodné texty (přidána tvoje nová hláška)
            const texts = [
                "Tato možnost vypršela! 😜", 
                "Zkus kliknout vedle! 👇", 
                "Tudy cesta nevede 🛑", 
                "Smůla! 🤷‍♂️", 
                "Chyť mě! 🏃‍♂️", 
                "Nee! ❌", 
                "Ale noo, snaž se 🥱"
            ];
            const randomText = texts[Math.floor(Math.random() * texts.length)];
            btnNo.innerText = randomText;
        }

        // FÁZE 3: Kalendář integrovaný do tvého funkčního základu
        function acceptPeace() {
            const container = document.getElementById('mainContainer');
            const btnNo = document.getElementById('btnNo');
            if(btnNo) btnNo.remove();

            // Zamezení výběru starých dat (nabídne dny od zítřka dál)
            const today = new Date();
            const tomorrow = new Date(today);
            tomorrow.setDate(tomorrow.getDate() + 1);
            const tomorrowStr = tomorrow.toISOString().split('T')[0];

            container.innerHTML = `
                <div class="datepicker-box">
                    <h2 style="color: #2ecc71; font-size: 1.8rem; margin-bottom: 5px;">Dohoda podepsána! 🎉🥳</h2>
                    <p style="margin-bottom: 15px;">Skvěle. Teď stačí vybrat datum, kdy se ti to hodí a je to. 🤗✨</p>
                    <input type="date" id="dateInput" min="${tomorrowStr}" onchange="checkDate()">
                    <button id="btnSubmitDate" onclick="confirmFinalDate()" disabled>Potvrdit datum</button>
                </div>
            `;
        }

        // Odemknutí potvrzení po kliknutí do kalendáře
        function checkDate() {
            const dateInput = document.getElementById('dateInput');
            const btnSubmit = document.getElementById('btnSubmitDate');
            
            if (dateInput.value) {
                btnSubmit.disabled = false;
            } else {
                btnSubmit.disabled = true;
            }
        }

        // FÁZE 4: Finální hláška se screenshotem
        function confirmFinalDate() {
            const container = document.getElementById('mainContainer');
            const selectedDateValue = document.getElementById('dateInput').value;
            
            // Převod na formát DD. MM. YYYY
            const dateParts = selectedDateValue.split('-');
            const formattedDate = `${dateParts[2]}. ${dateParts[1]}. ${dateParts[0]}`;

            container.innerHTML = `
                <div class="animate-box">
                    <h2 style="color: #ff477e; font-size: 2rem; margin: 0; line-height: 1.4;">
                        Super, platí! Už se na tebe teším ${formattedDate} moc těším. 🥰👋
                    </h2>
                    <div class="screenshot-note">
                        <strong>Udělej teď prosím screenshot</strong> této obrazovky a pošli mi ho do zpráv, ať si to můžu zapsat do kalendáře!See ya 📸✨
                    </div>
                </div>
            `;
        }
    </script>

</body>
</html>
