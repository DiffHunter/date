<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Půjdeš semnou? 🤭</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffe5ec, #ffc2d1);
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
        }

        .container {
            background-color: white;
            padding: 30px 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 450px;
            width: 90%;
            transition: all 0.3s ease;
        }

        h1, h2 {
            color: #ff477e;
            margin-bottom: 25px;
            font-size: 2.2rem;
        }

        .buttons {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            min-height: 150px;
        }

        button {
            padding: 15px 35px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        #btnYes {
            background-color: #2ecc71;
            color: white;
            box-shadow: 0 5px 15px rgba(46, 204, 113, 0.4);
        }

        #btnYes:hover {
            transform: scale(1.05);
            background-color: #27ae60;
        }

        #btnNo {
            background-color: #e74c3c;
            color: white;
            box-shadow: 0 5px 15px rgba(231, 76, 60, 0.4);
        }

        #btnNo:hover {
            background-color: #c0392b;
        }

        .datepicker-box {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
            animation: pop 0.5s ease;
        }

        .datepicker-instruction {
            font-size: 1.2rem;
            color: #ff477e;
            font-weight: bold;
            margin: 0;
        }

        input[type="date"] {
            border: 2px solid #ffc2d1;
            border-radius: 12px;
            background-color: #fff0f3;
            color: #444;
            padding: 15px;
            font-size: 1.2rem;
            width: calc(100% - 30px);
            cursor: pointer;
            outline: none;
            transition: all 0.2s ease;
        }

        input[type="date"]:focus {
            border-color: #ff477e;
            background-color: #fff;
            box-shadow: 0 0 10px rgba(255, 71, 126, 0.1);
        }

        #btnSubmitDate {
            background-color: #ff477e;
            color: white;
            margin-top: 10px;
            padding: 12px 40px;
            font-size: 1.1rem;
            width: 100%;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(255, 71, 126, 0.3);
        }

        #btnSubmitDate:disabled {
            background-color: #ccc;
            box-shadow: none;
            cursor: not-allowed;
        }

        .screenshot-note {
            font-size: 1.1rem;
            color: #666;
            margin-top: 20px;
            background-color: #fff0f3;
            padding: 15px;
            border-radius: 10px;
            border: 1px dashed #ff477e;
            animation: pop 0.5s ease 0.3s backwards;
        }

        @keyframes pop {
            0% { transform: scale(0.6); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="container" id="quizContainer">
        <h1 id="question">Půjdeš se mnou na ven? 🤭</h1>
        <div class="buttons">
            <button id="btnYes" onclick="sayYes()">ANO</button>
            <button id="btnNo" onclick="sayNo()">NE</button>
        </div>
    </div>

    <script>
        let clickCount = 0;
        let yesSize = 1.2;
        let yesPaddingX = 35;
        let yesPaddingY = 15;

        const noTexts = [
            "To jako vážně? 😢",
            "Opravdu ne? Rozmysli si to! 🤔",
            "Ty mě nemáš ráda? Zkus to znovu! 🥺",
            "Poslední šance vzít to zpět! 💔",
            "Jak chceš no 😭"
        ];

        function sayNo() {
            clickCount++;
            const btnYes = document.getElementById('btnYes');
            const btnNo = document.getElementById('btnNo');

            if (clickCount <= 5) {
                yesSize += 0.4;
                yesPaddingX += 15;
                yesPaddingY += 8;
                
                btnYes.style.fontSize = yesSize + "rem";
                btnYes.style.padding = `${yesPaddingY}px ${yesPaddingX}px`;

                if (clickCount <= noTexts.length) {
                    btnNo.innerText = noTexts[clickCount - 1];
                }
            } else {
                btnNo.style.display = 'none';
            }
        }

        function sayYes() {
            const container = document.getElementById('quizContainer');
            
            const today = new Date();
            const tomorrow = new Date(today);
            tomorrow.setDate(tomorrow.getDate() + 1);
            const tomorrowStr = tomorrow.toISOString().split('T')[0];

            container.innerHTML = `
                <div class="datepicker-box">
                    <p class="datepicker-instruction">Jeeej! Vyber si, kdy máš čas: 🥰🎉</p>
                    <input type="date" id="dateInput" min="${tomorrowStr}" onchange="checkDate()">
                    <button id="btnSubmitDate" onclick="confirmFinalDate()" disabled>Potvrdit datum</button>
                </div>
            `;
        }

        // Kontrola, zda vybrala datum
        function checkDate() {
            const dateInput = document.getElementById('dateInput');
            const btnSubmit = document.getElementById('btnSubmitDate');
            
            if (dateInput.value) {
                btnSubmit.disabled = false;
            } else {
                btnSubmit.disabled = true;
            }
        }

        // Závěrečná zpráva se screenshotem
        function confirmFinalDate() {
            const container = document.getElementById('quizContainer');
            const selectedDateValue = document.getElementById('dateInput').value;
            
            const dateParts = selectedDateValue.split('-');
            const formattedDate = `${dateParts[2]}. ${dateParts[1]}. ${dateParts[0]}`;

            container.innerHTML = `
                <h2 style="color: #ff477e; font-size: 2.2rem; margin: 0; line-height: 1.4;">
                    Super, platí! Už se na naše setkání ${formattedDate} moc těším. 🥰👋
                </h2>
                <div class="screenshot-note">
                    <strong>Udělej teď prosím screenshot</strong> této obrazovky a pošli mi ho na Insta, ať si to můžu zapsat do kalendáře! 📸✨
                </div>
            `;
        }
    </script>

</body>
</html>
